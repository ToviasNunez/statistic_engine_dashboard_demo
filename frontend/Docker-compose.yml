services:
  frontend: # React/Vite-Frontend für das User Interface
    build:
      context: .
      dockerfile: Dockerfile
    container_name: statengine-frontend
    ports:
      - "3000:80"
    networks:
      - stat-engine-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M

networks:
  stat-engine-network:
    external: true