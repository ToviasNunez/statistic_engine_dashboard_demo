events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;

        location /.well-known/ {
            log_not_found off;
            access_log off;
        }

        location / {
            try_files $uri /index.html;
        }
    }
}
